<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calisto Insights | Latest Articles</title>
    <meta name="description"
        content="Stay updated with the latest automation insights, product launches, and technical guides from Calisto Automation.">
    <meta name="keywords"
        content="automation news, gate opener installation guides, rolling shutter trends, smart home automation blog">
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <link rel="canonical" href="https://calistotech.com/blog.html">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://calistotech.com/blog.html">
    <meta property="og:title" content="Calisto Insights | Automation News & Updates">
    <meta property="og:description" content="Read expert articles on residential and industrial automation trends.">
    <meta property="og:image" content="https://calistotech.com/assets/og-blog.jpg">
    <meta property="og:locale" content="en_US">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://calistotech.com/blog.html">
    <meta name="twitter:title" content="Calisto Insights">
    <meta name="twitter:description" content="Latest insights from the world of entrance automation.">
    <meta name="twitter:image" content="https://calistotech.com/assets/og-blog.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Raleway:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/common.css?v=2">
    <style>
        /* Minimal page specific styles */
        /* Minimal page specific styles */
        body {
            color: var(--text-body);
            line-height: 1.75;
            -webkit-font-smoothing: antialiased;
            font-size: 1.05rem;
        }

        /* Blog Layout */
        .blog-container {
            max-width: 800px;
            margin: 8rem auto 4rem;
            /* Top margin increased to account for fixed header */
            padding: 0 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .page-header h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #0f172a;
            font-weight: 800;
            font-family: var(--font-head);
            letter-spacing: -0.02em;
        }

        .blog-post {
            background: #fff;
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 3rem;
            /* Scroll margin for sticky header offset */
            scroll-margin-top: 100px;
        }

        .post-meta {
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        .post-title {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            color: #0f172a;
            font-weight: 800;
            font-family: var(--font-head);
            letter-spacing: -0.02em;
        }

        .post-img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            margin-bottom: 2rem;
            max-height: 400px;
            object-fit: cover;
            display: block;
        }

        .post-body p {
            margin-bottom: 1.2rem;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #475569;
        }
    </style>
</head>

<body>

    <div id="header-placeholder"></div>

    <div class="blog-container">
        <div class="page-header">
            <h1>Calisto Insights</h1>
            <p style="color:var(--muted); font-size:1.1rem;">News and technical updates from the automation world.</p>
        </div>

        <div id="blog-posts-container">
            <!-- Blog posts will be injected here -->
        </div>

    </div>

    <div id="footer-placeholder"></div>

    <script>window.isInnerPage = true;</script>
    <script src="js/common.js"></script>
    <script src="js/blog-data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('blog-posts-container');

            blogPosts.forEach(post => {
                const article = document.createElement('article');
                article.className = 'blog-post';
                article.id = post.id;

                // Add click handler for the whole card to improve UX
                article.style.cursor = 'pointer';
                article.onclick = (e) => {
                    // Don't trigger if clicked on a specific link (though here the whole card links essentially)
                    window.location.href = post.link;
                };

                article.innerHTML = `
                    <div class="post-meta">${post.date}</div>
                    <h2 class="post-title"><a href="${post.link}" style="color:inherit; text-decoration:none;">${post.title}</a></h2>
                    <img src="${post.image}" class="post-img" alt="${post.title}">
                    <div class="post-body">
                        <p>${post.summary}</p>
                        <a href="${post.link}" style="color:var(--accent); font-weight:700; text-decoration:none;">Read More &rarr;</a>
                    </div>
                `;
                container.appendChild(article);
            });
        });
    </script>

</body>

</html>
